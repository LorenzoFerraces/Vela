services:
  postgres:
    image: postgres:16
    container_name: vela-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: vela
      POSTGRES_PASSWORD: vela
      POSTGRES_DB: Vela
    # Host 15432 → container 5432 (avoids colliding with local Postgres on 5432/5433).
    ports:
      - "15432:5432"
    volumes:
      - vela_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vela -d Vela"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  vela_postgres_dev_data:
